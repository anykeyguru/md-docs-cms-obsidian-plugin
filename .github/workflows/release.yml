# Build the plugin and publish a GitHub Release with the runtime artifacts
# whenever a `v*.*.*` tag is pushed.
#
# BRAT (https://github.com/TfTHacker/obsidian42-brat) reads `manifest.json`,
# `main.js`, and `styles.css` from the latest release, so those three files
# MUST be top-level release assets.
#
# Usage:
#   git tag v0.5.6
#   git push origin v0.5.6
# → Action runs, creates Release "v0.5.6" with the three asset files attached.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version=$TAG_VERSION) does not match manifest.json version=$MANIFEST_VERSION"
            exit 1
          fi
          echo "version match: $MANIFEST_VERSION"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            manifest.json main.js styles.css
